<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roman Cinis</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
  <meta name="description" content="AI first Dart and Rust developer" />
</head>
<body>
  <main class="hero">
    <div class="hero-inner">
      <div class="content-wrapper">
        <h1>Roman Cinis</h1>
        <p class="subtitle">AI-first Dart and Rust developer</p>
        
        <!-- Social Icons (2 rows of 4) -->
        <div class="social-links">
          <div class="tooltip-container">
            <a href="https://github.com/tsinis" target="_blank" rel="noopener noreferrer" class="btn-social github" aria-label="GitHub">
              <span class="icon icon-github"></span>
            </a>
            <span class="tooltip-text">GitHub</span>
          </div>
          <div class="tooltip-container">
            <a href="https://linkedin.com/in/tsinis" target="_blank" rel="noopener noreferrer" class="btn-social linkedin" aria-label="LinkedIn">
              <span class="icon icon-linkedin"></span>
            </a>
            <span class="tooltip-text">LinkedIn</span>
          </div>
          <div class="tooltip-container">
            <a href="https://dribbble.com/tsinis" target="_blank" rel="noopener noreferrer" class="btn-social dribbble" aria-label="Dribbble">
              <span class="icon icon-dribbble"></span>
            </a>
            <span class="tooltip-text">Dribbble</span>
          </div>
          <div class="tooltip-container">
            <a href="https://medium.com/@tsinis" target="_blank" rel="noopener noreferrer" class="btn-social medium" aria-label="Medium">
              <span class="icon icon-medium"></span>
            </a>
            <span class="tooltip-text">Medium</span>
          </div>
          <div class="tooltip-container">
            <a href="https://vimeo.com/tsinis" target="_blank" rel="noopener noreferrer" class="btn-social vimeo" aria-label="Vimeo">
              <span class="icon icon-vimeo"></span>
            </a>
            <span class="tooltip-text">Vimeo</span>
          </div>
          <div class="tooltip-container">
            <a href="https://youtube.com/@tsinis" target="_blank" rel="noopener noreferrer" class="btn-social youtube" aria-label="YouTube">
              <span class="icon icon-youtube"></span>
            </a>
            <span class="tooltip-text">YouTube</span>
          </div>
          <div class="tooltip-container">
            <a href="https://t.me/tsinis" target="_blank" rel="noopener noreferrer" class="btn-social telegram" aria-label="Telegram">
              <span class="icon icon-telegram"></span>
            </a>
            <span class="tooltip-text">Telegram</span>
          </div>
          <div class="tooltip-container">
            <!-- Email is now purely a UI element to trigger the tooltip -->
            <div class="btn-social mail" tabindex="0" aria-label="Email">
              <span class="icon icon-mail"></span>
            </div>
            <span class="tooltip-text">tsinis.job [at] gmail.com</span>
          </div>
        </div>
      </div>

      <!-- Rive Canvas Container -->
      <div class="canvas-container">
        <canvas id="rive-canvas" aria-label="Interactive Avatar of Roman Cinis" width="1000" height="1000"></canvas>
        <div id="canvas-fallback" class="fallback-text">Loading Avatar...</div>
      </div>
    </div>
  </main>

  <!-- Rive Web Runtime -->
  <script src="https://unpkg.com/@rive-app/webgl2"></script>
  <script src="script.js"></script>
</body>
</html>
