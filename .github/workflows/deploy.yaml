name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: 🚀 Deploy website
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ✅ Checks-out repository
        uses: actions/checkout@v7.0.0

      - name: 💾 Save to deploy
        run: |
          mkdir -p deploy
          cp -R assets deploy/ 2>/dev/null || true
          cp index.html deploy/ 2>/dev/null || true
          cp style.css deploy/ 2>/dev/null || true
          cp script.js deploy/ 2>/dev/null || true
          cp favicon.png deploy/ 2>/dev/null || true
          cp CNAME deploy/ 2>/dev/null || true
          cp LICENSE deploy/ 2>/dev/null || true

      - name: 🛫 Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy